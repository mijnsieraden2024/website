    <main class="main-content">
        <div class="tekstblok1">
            <div class="cart-section"> 
                <h1>Producten - Ringen</h1>
            </div>
        </div>

        <div class="product-container" id="product-lijst"></div>
    </main>

    <footer class="footer-text">
        &copy; 2026 - All rights reserved. | Mijn Sieraden
    </footer>

    <script>
document.addEventListener('DOMContentLoaded', () => {
    // --- 1. MENU LOGICA (VEILIG) ---
    const hamburgerBtn = document.getElementById('hamburger');
    const sidebarEl = document.getElementById('sidebar');
    const sidebarClose = document.getElementById('sidebar-close');
    const overlayEl = document.getElementById('overlay');

    if (hamburgerBtn && sidebarEl) {
        hamburgerBtn.addEventListener('click', () => {
            sidebarEl.classList.add('active');
            if (overlayEl) overlayEl.classList.add('active');
        });
    }

    if (sidebarClose) {
        sidebarClose.addEventListener('click', () => {
            sidebarEl.classList.remove('active');
            if (overlayEl) overlayEl.classList.remove('active');
        });
    }

    // --- 2. PRODUCTEN LADEN ---
    const productContainer = document.getElementById('product-lijst');
    
    // PAS DIT AAN PER PAGINA:
    const CATEGORIE = "ringen"; // of "haarklemmen" of "haarelastiekjes"
    const PREFIX = "Ring";    // of "Haarklem" of "Haarelastiekje"

    if (productContainer) {
        fetch('producten.json')
            .then(response => response.json())
            .then(data => {
                const items = data.filter(p => p.categorie === CATEGORIE);
                items.forEach(p => {
                    const html = `
                        <div class="product-card">
                            <img src="${p.foto}" alt="${p.naam}" class="product-image">
                            <h3>${p.naam}</h3>
                            <p>${p.omschrijving}</p>
                            <p class="price">€${p.prijs}</p>
                            <button class="add-to-cart" 
                                    data-name="Ring ${p.naam}" 
                                    data-price="${p.prijs}">
                                Voeg toe
                            </button>
                        </div>
                    `;
                    productContainer.innerHTML += html;
                });
            })
            .catch(err => console.error("Fout bij laden:", err));
    }

    // --- 3. MANDJE LOGICA ---
    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('add-to-cart')) {
            const product = {
                name: e.target.dataset.name,
                price: e.target.dataset.price
            };
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.push(product);
            localStorage.setItem('cart', JSON.stringify(cart));
            alert(product.name + ' is toegevoegd!');
        }
    });
});
</script>
</body>
</html>
